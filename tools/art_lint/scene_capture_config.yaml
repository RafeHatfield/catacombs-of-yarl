# Art scene capture configuration — docs/art_test_scene_spec_v2.md §5/§7.
# Single machine-readable source for capture resolution, camera parameters, and crop
# rectangles. Changing any value here is a ruling (spec §9 changelog), not a casual edit.
#
# Consumed by:
#   tools/art_lint/capture_scene.py   — launches Godot with --resolution from here.
#   tools/art_lint/crop_captures.py   — reads crops[].tile_rect to produce the 6x crops.

resolution:
  width: 750
  height: 1334
  # Reference device RULED (docs/art_test_scene_spec_v2.md §7, not provisional):
  # iPhone SE (2nd/3rd gen). 750x1334 is the SE's *physical* (@2x) pixel resolution —
  # logical points are 375x667. This capture targets the physical resolution directly
  # (a desktop windowed capture at that pixel size, not an on-device @2x render), which is
  # also why it matches TopDownRenderer's DefaultZoom=3.0 tuned for a ~720-750px-wide
  # physical viewport. The on-device sticker test itself is performed by Rafe (spec §6);
  # this harness produces the reproducible PR evidence at the same pixel size.

camera:
  # Fixed by the scene/renderer, recorded here for the crop tool's tile<->pixel math.
  # Source: src/Presentation/Map/TopDownRenderer.cs (tile size, DefaultZoom),
  # src/Presentation/Map/PlayerCamera.cs (UI margins), src/Logic/Core/ArtAcceptanceSceneBuilder.cs
  # (player position). "gameplay zoom (no debug zoom)" per spec §5 — this is
  # TopDownRenderer.DefaultZoom, not a value chosen for this capture.
  tile_size: 24
  zoom: 3.0
  ui_top_margin: 90
  ui_bottom_margin: 333
  player_tile: [5, 7]

# v3 repack (docs/art_test_scene_spec_v2.md ruling, superseding the PR #8 finding): the
# scene was repacked into a smaller room, translated to (5,7) player anchor, sized so the
# ENTIRE room — every prop, feature, item, creature, wall corner, and door — sits inside the
# visible tile rect (-1,0)-(10,13) with a full tile of margin on every side. Verified two
# ways: ArtAcceptanceSceneBuilderTests.Build_AllContentIsFullyInFrameWithMargin (machine
# check, independent camera-math reproduction) and a live --art-scene-capture run (this
# config's crops are all chosen from spec §5's originally-intended coverage list, now
# achievable — no PR #8-style substitution needed).
crops:
  - name: crop1_smithy_cluster
    description: >
      Smithy cluster — forge (5011), tool_rack (5089), anvil (5001), plus orc_grunt
      adjacent to the anvil. Fully in frame.
    tile_rect: [1, 1, 5, 4]  # x0, y0, x1, y1 — inclusive tile range
  - name: crop2_chest_key_items
    description: >
      Chest (closed, 5111) + chest (open, 5112) + key (5039) + all three canon items
      (healing_potion, dagger, club). Fully in frame — unlike PR #8, no tile column is
      clipped at the frame edge here.
    tile_rect: [1, 7, 7, 10]
  - name: crop3_worn_floor
    description: >
      Floor span containing the floor_worn (3001) tile at (4,9) — confirmed in-frame by
      the --art-scene-capture worn-tile report, not assumed. Overlaps crop2 somewhat
      (the worn tile sits directly under the key) — that overlap is intentional, showing
      the worn tile in its actual game context rather than isolated.
    tile_rect: [2, 8, 6, 10]

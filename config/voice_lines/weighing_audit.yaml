# Weighing Audit Dialogue
# Format: flat keys → list of page objects with speaker + text.
# Each key maps to a list of dialogue pages played in order.
# speaker: "under_warden" | "guardian" | "narrator"
# This is structured content (not random pools), so each key maps to exactly one sequence.

# The opening fires before Guardian 0 rises. Shared across all playthroughs.
opening:
  - speaker: under_warden
    text: "The visiting party has arrived. Noted, and entered."
  - speaker: under_warden
    text: "You may stand where you are. The proceeding does not require you to approach; the proceeding comes to you, in order, as it always has. I have your file. I have had your file for some time. It is not a short file."
  - speaker: under_warden
    text: "Understand what this is. This is not a punishment. This office does not punish; it reconciles. Every descent generates a record, and every record, in the fullness of time, is read back to the party who generated it, so that the account may be closed. You have generated a great deal of record. We are going to read it."
  - speaker: under_warden
    text: "It will be read in the order it accrued in significance, which is the order this office has determined, not the order you would choose. You do not get to choose the order. Few things about this proceeding are yours to choose, though I will tell you, when we reach them, which ones are."
  - speaker: under_warden
    text: "The Wardens of this hall will assist in the reading. Each will speak to the part of the account that concerns it. You may find their manner of speaking more direct than mine. They have not had the benefit of the correspondence; I have been writing to you for some time, and they have only been waiting."
  - speaker: under_warden
    text: "We will begin with the matter this office has documented most thoroughly.\n\nLet the first account rise."

# Warden-of-Wardens beat — four tiers
warden.allied:
  - speaker: under_warden
    text: "The first account concerns the Wardens of this hall, and the use to which you put them. The account is short. You wore the office of the Warden rarely, or not at all. Where you passed our officers, you passed them as they were, and left them as you found them. This office notes the restraint. It is not obligated to note it; it chooses to. The Warden that rises for you rises in good order, and will stand at your side, because you gave it no cause to stand otherwise."
  - speaker: guardian
    text: "You never wore me. I remember that. Stand, and I stand with you."

warden.diminished:
  - speaker: under_warden
    text: "The first account concerns the Wardens of this hall. You wore the office on occasion -- twice by this office's count, early, before the correspondence grew firm. The intervals were brief. The officers concerned recovered their time and filed no lasting grievance. This office considers the matter substantially reconciled, and the Warden that rises rises weakened, carrying only what little you took. It will not trouble you long."
  - speaker: guardian
    text: "You wore me once. Briefly. I have mostly forgiven the hour you took. Mostly."

warden.neutral:
  - speaker: under_warden
    text: "The first account concerns the Wardens of this hall, and it is not a short account. You wore the office repeatedly -- often enough that the order took notice, often enough that this office moved the matter from routine to review. The officers concerned have reconstructed what time they could. Some of it did not come back. The Warden that rises carries the hours you spent inside it, and it carries them as weight, and it will set that weight against you now."
  - speaker: guardian
    text: "You made my body walk where I did not send it. You will not do it here. Here, the body is mine."

warden.savage:
  - speaker: under_warden
    text: "The first account is the one this office has documented most thoroughly, because you gave it the most to document. You wore the Wardens of this hall as a man wears coats. You took their hours, their posts, their hands, and you returned what was left of them to duties they could no longer fully perform. I wrote to you about this. I wrote to you a great many times. You will find that what rises now has read every letter, and agreed with all of them."
  - speaker: guardian
    text: "We are the hours you stole. All of them. Every interval, every post left empty, every officer who woke not knowing where the time had gone. We have been assembled for you. Now wear this."

# Oathkeeper beat — four tiers
oathkeeper.allied:
  - speaker: under_warden
    text: "The second account concerns the Unshriven, and the faith you kept with them. This office observes that the Unshriven keep their own faith with notable consistency. They have held their post on the Boundary for four hundred years, under terms they did not choose and cannot lay down. They are, in the administrative sense, exemplary. You dealt with them honestly. You did not spend their lives where their lives did not need spending. The account is in good standing, and what rises from it rises as a friend, which this office notes is a rarer outcome than the Unshriven's reputation would suggest."
  - speaker: guardian
    text: "You kept faith. We felt it, down on the line. The king does not say such things aloud, so I will say it for him: you stood with us, and now I stand with you. Swing well."

oathkeeper.diminished:
  - speaker: under_warden
    text: "The second account concerns the Unshriven. You and they were not friends, but you were not false with them. What blood was spilled between you was spilled in fair exchange, each side knowing the terms. The Unshriven hold no grievance they would name. The Oathkeeper rises, but it rises uncertain, because it cannot find in the record the betrayal it was made to answer. It will test you, lightly, and finding little, it will not press."
  - speaker: guardian
    text: "I came up looking for an oath you broke. I do not find it. We fought, you and I, but we fought clean. I will not swing hard at a man who never lied to me."

oathkeeper.neutral:
  - speaker: under_warden
    text: "The second account concerns the Unshriven, and it is a mixed account. You dealt with them when it served you and spent them when it served you, and some of the lives you took were lives that would have let you pass. The Unshriven do not understand this. They are a people who kill for the holding of the line, never for the convenience of it. The blood you spilled past need is on the file, and the Oathkeeper has come to weigh it. It will press. It thinks you should have known better, and this office is inclined to agree."
  - speaker: guardian
    text: "Some of mine you killed because they stood in your way. That is war; I forgive it. Some you killed because killing was the shorter road. That I do not forgive. We held the line four hundred years and never once took the shorter road. You could not hold yours one walk down."

oathkeeper.savage:
  - speaker: under_warden
    text: "The second account concerns the Unshriven, and it is an account of broken faith. They held their post for four hundred years. They kept terms they hated, because terms are terms. You came among them, and you took what they offered, and then you turned on them where it suited you, and you spent their lives as though their lives were yours to spend. This office will be plain, which it is rarely moved to be: the Unshriven did everything correctly, for four centuries, and you did not manage it for the length of a single descent. The Oathkeeper rises at its full weight. It is made of every oath you broke, and it has kept count."
  - speaker: guardian
    text: "Four hundred years we held. Four hundred years, and not one of us broke faith, though the wanting near killed us. Then you. You took the king's salt and you turned on his line. You spent us like coin. We are the oath you broke, Sasha of Reven, and we have come up out of the dark to break you back. There is no geas on us. Not here. Not for this."

# Auditor's Own beat — four tiers (scales inverted: allied = disappointed, savage = ecstatic)
auditor.allied:
  - speaker: under_warden
    text: "The third account concerns excess. Specifically, suffering caused beyond the requirements of descent. This office finds the account nearly empty. You killed what stood against you and little else. What rises to weigh this account is older than this office and does not answer to it; I can only announce it. It has read your record, and I am given to understand it is not pleased with what it found, though not for the reasons the others were."
  - speaker: guardian
    text: "Oh. Oh, it's... you only killed what you HAD to. Every one of them, a reason. How tidy. How very... necessary. (a small sound, not quite a sigh) I came up out of the warm dark for this? For a careful little man with a careful little ledger of needs-must? No. No, no. You're no fun at all. Go on, then. Go on up the hall. We have nothing to say to each other, you and I. (it is already turning away) Pity. I so hoped you'd be someone."

auditor.diminished:
  - speaker: under_warden
    text: "The third account concerns excess. The account is light, but it is not empty. A handful of the dead, here and there, who need not have died. What weighs this account is older than this office. It has found a little to interest it in your record. Only a little. I would not, were I you, give it more."
  - speaker: guardian
    text: "Mm. There's... a TASTE here. Not much. A few. The ones you didn't strictly need. (a low, pleased hiss, then it pulls back, unsure) I keep looking for the rest of it. The real appetite. It isn't here, is it. You had a few bad afternoons and you felt GUILTY about them. (the warmth curdles slightly) Guilt. I do so dislike guilt. It means you'd stop, if you could. We'll see how much you'd stop. Come and show me."

auditor.neutral:
  - speaker: under_warden
    text: "The third account concerns excess, and here the account has weight. A pattern of the dead who posed you no threat and received no mercy. This office records it without comment, as is proper. What weighs the account will not be so reserved. It has found a great deal to interest it, and I would remind you that its interest is not a kindness."
  - speaker: guardian
    text: "THERE you are. There you are. I knew there was something under the careful. Look at thessse - (it savors it) - the ones on their knees. The ones running. The one that had already dropped what it was holding. You didn't NEED a single one of them, and you took them anyway, and oh, sweet thing, oh, I FELT that all the way down here. We're going to get along. We're going to get along FAMOUSLY. (a giggle, abrupt, wrong) Don't be shy now. You weren't shy THEN."

# Note on Auditor's Own savage close: intentionally ends mid-surge on a trailing dash. The
# combat begins out of the break. The trailing dash IS the dismiss; no resolving line appended.
auditor.savage:
  - speaker: under_warden
    text: "The third account concerns excess, and the account is the heaviest this office has ever forwarded to the authority that weighs it. The dead who needed not die fill the file. This office will say only this, and then it will say no more on the matter: what rises now is the thing this office exists to keep contained, and you have spent your descent feeding it. It is very, very pleased with you. You should be more frightened by that than by anything the others said."
  - speaker: guardian
    text: "THERE. (the word swells, far too large, and the hall feels it) There you are, there you ARE, oh I have WAITED, I have waited so long in the warm dark for one of you to come down to me with hands like THESE - (it is laughing, and the laugh keeps almost becoming something else) - hundreds. HUNDREDS. Who would have let you pass. Who BEGGED. And you, you beautiful thing, you didn't even slow down. You and I, we're the same. We ARE. Say it. (softer, sibilant, unbearably intimate) No - no, you don't have to say it. I can SEE it. It's written all through you, the way it's written all through me. (and here the performance starts to come apart - the friendliness was the cage, and the cage is failing) And I have been so good. So patient. So POLITE, up here where they make me be polite - (the word distorts) - and you, you came down with all that lovely red still on you, and you smell like the warm dark smells, you smell like HOME, and I am so - I am so - (it is no longer making sentences; the beast is at the surface and the friend is gone) - I am so HUNGRY, friend, I have always been so hungry, and you are so CLOSE now, and there is no office down here, there is no office down HERE -"

# ── Combat-death resolutions ──────────────────────────────────────────────────────────────────
# Short and final. LossGuardians is curt (fell before reaching the Debt). LossDebt aches (closest
# failure; the Lady is present because you died in her hall reaching for Anik). Do not pad.
resolution.loss_guardians:
  - speaker: under_warden
    text: "The visiting party did not complete the proceeding. The account remains open. The reading will resume when the party returns, as the party will."
  - speaker: narrator
    text: "You fell among your own accounts, with the Debt still unread and Anik still unreached. The Under-Warden files the hour and turns the page. There is always another descent. There is always another reading. The stairs are patient, and so is he."

resolution.loss_debt:
  - speaker: debt
    text: "Oh, so close. So close, and so tired. Come here. You reached so far. Rest now; you have earned the resting, even if you did not earn the having. (softer) She is still here. She is always here. You will reach her next time, or the time after. I am in no hurry, and now, neither are you."
  - speaker: narrator
    text: "You died with your hand almost upon her, in the warm hall at the bottom of the world. The Lady receives you gently, as she receives everything, and holds you a while beside the one you came for, the two of you so near and not yet free. Above, the stairs wait. You will come down them again. You always do."

# ── Ally-fallback lines ───────────────────────────────────────────────────────────────────────
# Fire on AlliesFellBackEvent. Framing narration fires only if at least one Guardian allied.
# Per-Guardian lines fire only for Guardians that actually allied this run.
# The Auditor's Own fallback is DISMISSAL (inverted character), not solidarity.
ally_fallback.framing:
  - speaker: narrator
    text: "The Debt rises at the head of the hall, and one by one, those who stood with you step back. Not driven. Not barred. They step back because this part was never theirs."

ally_fallback.warden:
  - speaker: guardian
    text: "This is past the edge of my post, and past the edge of my charter. I kept the law for you because you kept it for me. But the law does not reach the thing at the head of this hall. You go to it as you came: yourself. Go well."

ally_fallback.oathkeeper:
  - speaker: guardian
    text: "This one we cannot carry for you, Sasha of Reven. We would if we could. We have carried much. Not this. (a beat, hammered) Stand. We will be here when you turn back around. If you turn back around."

ally_fallback.assembly:
  - speaker: guardian
    text: "We'd come with you. We always came with you. (dry, and it costs something) But we already tried this part, every one of us, and we are the proof of how it went. This time you go without us. Maybe that's what changes it. (a beat) Go on. We'll be watching, same as ever."

# Not solidarity — dismissal. The beast loses interest because the Lady doesn't deal in what it eats.
# Only fires for clean-record players where the Auditor's Own allied out of boredom.
ally_fallback.auditor:
  - speaker: guardian
    text: "Mm. No. I don't follow careful little men into rooms like that one. There's nothing in there for me -- she doesn't deal in the kind of thing I eat. (a yawn, almost) Go and be tedious with the tall pale woman. We're done, you and I. You were never going to be any fun."

# ── Debt choice gate UI copy ──────────────────────────────────────────────────────────────────
# Button labels (terse -- the Lady named the three options in her terms).
# Confirmation text for Force and Swap (irreversible, run-ending). Refuse has no confirmation.
ui.force_button:
  - speaker: ui
    text: "Take her by force."

ui.self_button:
  - speaker: ui
    text: "Give yourself in her place."

ui.refuse_button:
  - speaker: ui
    text: "Turn back. Carry the debt."

ui.force_confirm:
  - speaker: ui
    text: "You will tear her free against the Lady's hold. If you fall, you fall here, in the warm hall, with her almost in reach. Reach anyway?"

ui.self_confirm:
  - speaker: ui
    text: "You will give yourself into the Long Hour, and she will go up without you, and never know the cost. There is no taking this back. Stay, so that she goes free?"

# ── The Debt — the Lady's terms, unscaled, fires before the gate / auto-resolve.
# Six pages: narrator scene-set, Lady (3 pages at natural breaks), Anik (ambiguous), Hollowmark threshold.
# Trim priority: the Lady's opening two pages are prime trim candidates once it pages in-game.
# The ambiguity of Anik's voice (her or the claim wearing her) is intentional and unresolvable.
# speaker: "debt" = the Lady; speaker: "anik" = Anik surfacing through the claim.
debt:
  - speaker: narrator
    text: "The allies have fallen back. You have walked the length of the hall alone. At the head, where the Under-Warden presided, something rises that he does not announce, because it does not answer to him. It is not cold. That is the first wrong thing."
  - speaker: debt
    text: "Ah. There you are. At last, at last. I felt you on the stairs, all that long way down, hurrying so. You did not have to hurry. I would have waited. I have such a great deal of waiting in me; it is most of what I am."
  - speaker: debt
    text: "You have come such a long way, and died so many times to do it, and look at you, still warm, still wanting. I do love the wanting ones. They come to me brightest.\n\n(and within the light, held, there is a shape, and the shape is hers)\n\nDo you see what I keep? I keep her so gently. You needn't have worried, all this time. Nothing is hurt here. Nothing is ever hurt here. Things only come home, in the end, the way rivers come to the sea, the way you have come to me tonight without quite meaning to. She came to me. You will come to me. It was always only a question of the order, and the order does not matter to me as it matters to you."
  - speaker: debt
    text: "So. Here is what is yours to choose, the small thing the warden promised you. You may take her, if you can, by force, and carry her back up into the cold and the wanting, for a while, until you both come home again, as you will. Or you may stay, and give yourself into her place, and let her go up without you, and rest -- oh, you are so tired, I can feel how tired you are from here. Or you may turn from this room and keep your debt unpaid a little longer, and we will simply wait for each other, you and I, as we have been waiting all along.\n\nThere is no wrong choice. They all end here, with me, eventually. Choose the one that lets you put the burden down."
  - speaker: anik
    text: "Sasha. (and it is her, it is exactly her, or it is exactly the shape of her) Sasha, stop. Look at you. Look at what you've spent. I'm not -- I was never worth all of this. You have to know that by now. Put it down. Go home. Let me go. (softer) I would rather be here forever than watch you do this to yourself one more time. Please. For me. Go home."
  - speaker: hollowmark
    text: "Whatever you pick, Boss, pick it because it's yours to pick. Not because she's tired. Not because I am. (a beat) I've got one more pull in me if you need it. Don't waste it being noble."

# Resolutions — fire on WeighingResolvedEvent, before game-over.
# speaker: "narrator" for closing narration; speaker: "debt" for the Lady; speaker: "hollowmark" for Holl.
resolution.clean_audit:
  - speaker: debt
    text: "Oh. (a pause, and something like pleasant surprise) You come to me already light. Look -- there is almost nothing owing. You spent so little that was not spent well. You may take her, then; the account closes itself, and there is nothing here to fight, because you have already paid me in the only coin I ever truly keep, which is the manner of a life.\n\nTake her hand. Go up. (the faintest wistfulness) You will come home in your own time, both of you, and I will be glad of you then. I am in no hurry. Go."
  - speaker: narrator
    text: "Sasha takes Anik from the light, and she is warm, and she is herself, and the long hall opens behind them. The debt is paid. They climb."

# Swap: three pages -- Lady (tender, not disappointed), Hollowmark (the payoff, voice fully breaks,
# stays short), narrator closing. "Then I'll stay too" is the most important line in the game.
resolution.swap:
  - speaker: debt
    text: "(she is not disappointed; she is tender) Yes. Oh, yes. I thought you might. The tired ones do, sometimes, the ones who have carried someone a long way. You give yourself, and she goes up, and the books are even, and I lose nothing, because it was always going to be one of you, and you are warm, and you are here, and you will do."
  - speaker: hollowmark
    text: "...There it is. (a long beat) You stubborn, stupid, good man. (she does not say the rest) Then I'll stay too. To the end of it. You didn't think I'd let you do the last part alone."
  - speaker: narrator
    text: "The Lady receives Sasha into the Long Hour, and it is not cruel, and that is the worst and the kindest thing. He laid the burden down. He is not alone. Somewhere above, a woman wakes, and does not know why she is weeping."

# Theft: Lady is not angry even now (patient, that is worse). The open wound.
resolution.theft:
  - speaker: debt
    text: "(unhurried, even as the claim is torn) There. You have taken her up by the root, and it will bleed, the place you tore her from, it will bleed a long time. But take her. Go. (the terrible serenity holds) You have not escaped me, Sasha. You have only made me wait, and made the waiting harder, and I will hold the torn place open until you bring her back down, or come down yourself to mend it. A debt taken by force is still a debt. I will see you again. I am always, always glad to see you."
  - speaker: narrator
    text: "Sasha tears Anik free and runs, and she is warm and she is alive and the claim screams silently behind them, unpaid, unhealed. They climb out of the Paths with the wound open at their backs. It is not over. It will never quite be over. But she is breathing, and so is he, and for tonight that is enough."

# Refused: gentle, unsurprised, the patience is unbearable.
resolution.refused:
  - speaker: debt
    text: "(no anger, only patience) Going? Yes. Yes, I thought you might not be ready. It is a great deal to choose, and you have only died a dozen times; some come to me a hundred times before they are ready to choose at all. Go back up, then. Carry it a while longer. (the warmth is unbearable) I will keep her safe for you. I keep everything safe. And when you are ready -- this year, or in a hundred -- you will come down these stairs again, and I will say there you are, as I said tonight, and we will try once more. There is no hurry. There has never, ever been any hurry."
  - speaker: narrator
    text: "Sasha turns from the hall and climbs back up into the world, the debt unpaid, Anik still held, the Lady's patience following him up every stair like warmth from a door left open behind him. He will come back. He knows he will come back. That is the whole of what she has, and it is enough."

# Assembly of the Lost beat — four tiers (three speakers: under_warden, assembly/guardian, hollowmark)
# Tier axis: CumulativeDeaths. Allied=0-2, Diminished=3-5, Neutral=6-10, Savage=11+.
# Grief crack fires at Neutral (brief) and Savage (longer, doesn't quite close).
# Hollowmark's register tightens under load — shorter as it gets heavier, never longer.
assembly.allied:
  - speaker: under_warden
    text: "The fourth account concerns the dead. Specifically, your own. This office keeps a record of every termination a visiting party sustains, and the record for this party is short. You have died rarely. What rises to weigh the account is small, because you have given it little to be made from. It will not hold against you what is barely there."
  - speaker: guardian
    text: "Oh, it's us. Hello. There aren't many of us. (a dry beat) We'd say it's good to see you still walking, but we're the proof you mostly do. Go on. We're hardly a crowd."
  - speaker: hollowmark
    text: "Two, Boss. You've been careful. (a beat) Keep it that way."

assembly.diminished:
  - speaker: under_warden
    text: "The fourth account concerns your own dead. The record runs to several. Not many, by the measure of this place, but enough that the account has form. These are the descents that ended, and began again. What rises has been assembled from them, and it knows your face, because it wore your face, each time, on the way down."
  - speaker: guardian
    text: "The acid one. (- the trap on the ninth floor -) (- I never saw the thing that did it -) We all have a story. They're all short. (dry) You'd think we'd have learned from each other. We didn't. We never get to compare notes until now."
  - speaker: hollowmark
    text: "Five. (a beat - quieter than usual, and she doesn't say why) I remember all five. Doesn't matter. Go."

# Grief crack fires at Neutral. Under-Warden: "for the length of a single breath, the procedure thins."
assembly.neutral:
  - speaker: under_warden
    text: "The fourth account concerns your own dead, and they are many. You have died, and returned, and died, and returned, more times than this office finds comfortable to enumerate, though enumerate it has. What rises is a crowd, and the crowd is you, every version of you that did not survive the descent it was given. This office has processed a great many visiting parties. Most, when they die, have the decency to stay. (and here, for the length of a single breath, the procedure thins) You keep coming back. For someone. I knew a party once who would not come back, who stayed where she was put, and I have wondered, in the time since, whether staying was the failure or the grace. (the breath ends; the file closes over it) The account stands ready to be weighed. Proceed."
  - speaker: guardian
    text: "There are a lot of us now. (- the oil, the fire -) (- I went off the edge, it was further than it looked -) (- possessed something I shouldn't have, I learned what it ate -) We keep dying for the same person. (dry, but it costs something) You'd think one of us would have managed it by now. You'd think one of us would have been enough. (a beat) Don't stop on our account. We didn't get to. Why should you."
  - speaker: hollowmark
    text: "Eight, Boss. (she's not bantering now) Eight times I went into the cold and got you. I'm not going to tell you what it costs. You'd start rationing me. (a beat) Don't."

# Grief crack fires at Savage, fuller — doesn't quite close. Assembly invokes Anik directly.
# Hollowmark: span nearly spent; Marya substrate cracks through sideways, never a speech.
assembly.savage:
  - speaker: under_warden
    text: "The fourth account concerns your own dead, and there is no short way to read it. You have died past counting and returned past counting. The hall before you is full of you. This office will observe what this office has never had cause to observe of any other party: you are harder to keep dead than anything that has ever come down these stairs, and the thing that keeps bringing you back has spent nearly all of itself doing it, and you do not appear to know. (and the procedure thins, and does not quite close again) I let someone go, once. I told myself the post required it. I have had a long time to study the difference between us, and the difference is that when the cold took the one you owe, you went into the cold after them, and you have been going ever since, and you did not count the cost, and neither, I see now, did what carries you. (a long pause; the bench reasserts itself, but slower) I find I am not able to be entirely cold about this account. Note that it is the only one. Proceed."
  - speaker: guardian
    text: "Look how many of us. (no deflection left, or only the husk of it) (- I lost count of how I died -) (- does it matter, by now -) (- it was quick, mine, if that helps -) (it doesn't) We are every time you weren't enough, and you came back anyway, and you spent her to do it. (and here the Assembly says the thing Sasha never lets himself think) She would have told you to stop. The one we're all dying for. Anik would have told you to stop a long time ago. (dry, and devastating) But you don't listen to us either. Why would you start with the dead."
  - speaker: hollowmark
    text: "Not many left now, Boss. The pulls. I'm not telling you the number. (a beat) Binding's been done a while. This part's me. (the Marya substrate surfaces, but sideways, clipped) I couldn't reach someone, once. Long time ago. You, I can reach. (a beat) So finish it. Get her. Then I rest - not before. Don't you dare spare me."

scenario_id: test_possession_arena
name: "Possession — Target Selection"
category: Possession
description: >
  Tests the possession system manually. Player faces three possessable orcs within
  range and one skeleton (immune to possession — status_immunities includes 'possessed').
  Goal: verify you can enter possession targeting mode, possess an orc, move it around,
  and exit possession. Confirm the skeleton shows as invalid target.
  No bot_persona — this needs manual play to test the input flow.
depth: 2
turn_limit: 1000
runs: 1
map_width: 16
map_height: 16
player_start_x: 3
player_start_y: 8

player:
  hp: 60
  strength: 12
  dexterity: 14
  constitution: 12
  accuracy: 2
  evasion: 1
  damage_min: 1
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: orc
    count: 3
  - type: skeleton
    count: 1

items:
  - type: healing_potion
    count: 5

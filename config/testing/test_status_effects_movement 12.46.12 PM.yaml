scenario_id: test_status_effects_movement
name: "Status Effects — Movement (Entangled, Fear, Disorientation)"
description: >
  Verify movement-gating status effects.
  scroll_of_glue → EntangledEffect: target cannot move but can still attack if adjacent.
  scroll_of_fear → FearEffect: target flees away from player each turn.
  scroll_of_confusion → DisorientationEffect: target moves in random directions instead of toward player.
  Three orcs spaced 5 tiles away — close enough for range-8 scrolls, far enough to observe flee behavior.
  Goal: Entangled orcs stay put; feared orcs retreat; confused orcs move erratically.
depth: 2
turn_limit: 150
runs: 1
map_width: 20
map_height: 20
player_start_x: 10
player_start_y: 10

player:
  hp: 100
  strength: 14
  dexterity: 14
  constitution: 12
  accuracy: 4
  evasion: 2
  damage_min: 2
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: "orc"
    count: 3
    position: [15, 10]

items:
  - type: "scroll_of_glue"
    count: 2
  - type: "scroll_of_fear"
    count: 2
  - type: "scroll_of_confusion"
    count: 2
  - type: "healing_potion"
    count: 2

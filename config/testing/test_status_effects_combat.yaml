scenario_id: test_status_effects_combat
name: "Status Effects — Combat (Shield, Invisibility, Weakness, Blind)"
description: >
  Verify combat-modifying status effects.
  scroll_of_shield → ShieldEffect: player takes reduced damage (AC +4) for 10 turns.
  scroll_of_invisibility → InvisibilityEffect: monsters skip player as attack target until player acts.
  scroll_of_disarm → DisarmedEffect: target cannot make weapon attacks.
  scroll_of_slow → SlowedEffect: target acts only every other turn.
  Three orcs at close range. Player uses buffs then observes reduced incoming damage
  and missed attacks from disarmed/slowed enemies.
  Goal: ShieldEffect reduces damage taken; invisible player is not attacked; disarmed orcs fail weapon attacks.
depth: 2
turn_limit: 120
runs: 1
map_width: 16
map_height: 16
player_start_x: 4
player_start_y: 4

player:
  hp: 80
  strength: 14
  dexterity: 14
  constitution: 12
  accuracy: 4
  evasion: 1
  damage_min: 2
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: "orc"
    count: 3
    position: [7, 4]

items:
  - type: "scroll_of_shield"
    count: 2
  - type: "scroll_of_invisibility"
    count: 2
  - type: "scroll_of_disarm"
    count: 2
  - type: "scroll_of_slow"
    count: 2
  - type: "healing_potion"
    count: 2

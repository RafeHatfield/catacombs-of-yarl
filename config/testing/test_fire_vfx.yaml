scenario_id: test_fire_vfx
name: "VFX Test — Fire & Spells"
description: >
  Focused manual test for spell visual effects. Small open arena with a few orc
  targets. Only fire/lightning/dragon fart spells and healing pots — no random drops.
  Tests: fireball travel + burst, lightning path, dragon fart cone, thrown potions.
dungeon_mode: true
depth: 2
turn_limit: 9999
runs: 1

guaranteed_spawns:
  mode: replace

  monsters:
    - type: orc
      count: 3
    - type: orc_grunt
      count: 2

  items:
    # Healing to stay alive while testing
    - type: healing_potion
      count: 5

    # Fire
    - type: scroll_of_fireball
      count: 3
    - type: wand_of_fireball
      count: 1

    # Lightning
    - type: scroll_of_lightning
      count: 3
    - type: wand_of_lightning
      count: 1

    # Dragon fart
    - type: scroll_of_dragon_fart
      count: 3

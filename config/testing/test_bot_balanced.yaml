scenario_id: test_bot_balanced
name: "Bot — Balanced Persona (Standard Fight)"
category: Bot
description: >
  Balanced persona bot auto-starts against a standard mid-depth orc pack.
  Good baseline for watching normal bot decision-making: heal threshold, flee
  logic, item pickup, potion use, positioning. Use F5 to cycle personas and
  observe behavioural differences without reloading.
all_items_identified: true
default_bot_persona: balanced
depth: 3
turn_limit: 500
runs: 1
map_width: 18
map_height: 18
player_start_x: 3
player_start_y: 9

player:
  hp: 54
  strength: 12
  dexterity: 14
  constitution: 12
  accuracy: 2
  evasion: 1
  damage_min: 1
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: orc
    count: 3
  - type: orc_brute
    count: 1

items:
  - type: healing_potion
    count: 3
  - type: scroll_of_shield
    count: 1

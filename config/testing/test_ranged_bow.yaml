scenario_id: test_ranged_bow
name: "Ranged — Bow & Special Arrows"
category: Ranged Combat
description: >
  Tests ranged combat with bow and arrow types. Player has a longbow equipped,
  a quiver of net arrows (immobilise on hit), fire arrows (burning DoT), and
  standard arrows. Pack of orcs and a troll at range. Bot auto-starts in aggressive
  mode so you can watch kiting behaviour without manually playing it.
all_items_identified: true
default_bot_persona: aggressive
depth: 3
turn_limit: 500
runs: 1
map_width: 20
map_height: 20
player_start_x: 3
player_start_y: 10

player:
  hp: 54
  strength: 12
  dexterity: 16
  constitution: 12
  accuracy: 3
  evasion: 2
  damage_min: 1
  damage_max: 6
  weapon: "longbow"
  armor: "leather_armor"
  quiver: "net_arrow"
  player_bot: "ranged_net_arrow"

monsters:
  - type: orc
    count: 3
  - type: orc_grunt
    count: 2
  - type: troll
    count: 1

items:
  - type: healing_potion
    count: 3
  - type: net_arrow
    count: 10
  - type: fire_arrow
    count: 5

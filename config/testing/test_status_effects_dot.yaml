scenario_id: test_status_effects_dot
name: "Status Effects — DOT (Damage Over Time)"
description: >
  Verify that PoisonEffect, PlagueEffect, and BurningEffect apply damage-over-time
  each turn and eventually kill the target.
  Player has scroll_of_dragon_fart (applies PoisonEffect) and scroll_of_plague (applies PlagueEffect).
  Four orcs at close range — test that DOT whittles them down across multiple turns.
  Goal: DotDamageEvent emitted each turn, targets die from accumulated DOT even without direct attacks.
depth: 3
turn_limit: 200
runs: 1
map_width: 16
map_height: 16
player_start_x: 3
player_start_y: 3

player:
  hp: 120
  strength: 16
  dexterity: 14
  constitution: 14
  accuracy: 5
  evasion: 2
  damage_min: 2
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: "orc"
    count: 2
    position: [6, 3]
  - type: "zombie"
    count: 2
    position: [3, 6]

items:
  - type: "scroll_of_dragon_fart"
    count: 3
  - type: "scroll_of_plague"
    count: 3
  - type: "healing_potion"
    count: 3

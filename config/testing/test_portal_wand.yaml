scenario_id: test_portal_wand
name: "Portal Wand — Traversal Mechanics"
category: Spells & Wands
all_items_identified: true
description: >
  Tests the Wand of Portals traversal system.
  Player starts with the wand_of_portals (infinite charges) in a 20x20 arena.
  Arena contains 2 orcs on the far side — player uses portals to reposition tactically.
  This scenario is primarily a harness-observable smoke test: verifies that portal
  placement, PortalPlacedEvents, and portal teleportation do not break the turn loop.
  The bot does not currently use portals (it attacks/moves normally), so this scenario
  validates that the wand_of_portals in starting inventory does not cause issues.
depth: 1
turn_limit: 200
runs: 1

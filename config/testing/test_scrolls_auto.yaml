  Tests auto-targeting and AoE spells: lightning, earthquake, magic_mapping, light,
  detect_monsters. Arena has a mix of orcs, zombies, and an orc_brute to ensure
  spell damage lands on real targets. Player carries enough scrolls to fire several
  per run. Goal: all spells resolve without errors; monsters take damage from offensive spells.

scenario_id: test_faction_combat
name: "Factions — Orcs vs Undead"
category: Factions
description: >
  Tests emergent faction combat. Orcs and undead (zombies + skeleton) are hostile
  to each other. Player stands back and watches them fight, or uses scrolls to
  manipulate the situation. Bot auto-starts in speedrunner mode — watches from a
  distance and only engages survivors. Tests faction hostility resolution, emergent
  fight outcomes, and that player does not get hit by cross-fire.
all_items_identified: true
default_bot_persona: speedrunner
depth: 4
turn_limit: 600
runs: 1
map_width: 20
map_height: 20
player_start_x: 2
player_start_y: 10

player:
  hp: 54
  strength: 12
  dexterity: 14
  constitution: 12
  accuracy: 2
  evasion: 1
  damage_min: 1
  damage_max: 8
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  - type: orc
    count: 3
  - type: orc_brute
    count: 1
  - type: zombie
    count: 3
  - type: skeleton
    count: 2

items:
  - type: healing_potion
    count: 3
  - type: scroll_of_lightning
    count: 2

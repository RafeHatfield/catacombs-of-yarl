scenario_id: testing_full
name: "Testing Full — All Systems"
description: >
  Prime testing scenario. Procedural dungeon floor at depth 1 with one of every item
  type injected as guaranteed spawns. Tests camera scrolling, FOV, spell items, wands,
  status effects, equipment, pick-up/equip/unequip, and all monster types.
  Player uses default loadout (dagger, leather armor, healing potion, wand of portals).
dungeon_mode: true
depth: 1
turn_limit: 9999
runs: 1

guaranteed_spawns:
  mode: additional

  monsters:
    # Slimes — test corrosion, split mechanic
    - type: slime
      count: 1
    - type: large_slime
      count: 1
    # Orcs — test equipment variation (75% weapon, 50% armor spawn chance)
    # Expect ~3/4 with weapons, ~2/4 with armor
    - type: orc
      count: 4

  items:
    # Consumables
    - type: healing_potion
      count: 3

    # Scrolls — status effect (single-target)
    - type: scroll_of_confusion
      count: 1
    - type: scroll_of_slow
      count: 1
    - type: scroll_of_glue
      count: 1
    - type: scroll_of_rage
      count: 1
    - type: scroll_of_yo_mama
      count: 3
    - type: scroll_of_disarm
      count: 1
    - type: scroll_of_plague
      count: 1
    - type: scroll_of_aggravation
      count: 1
    - type: scroll_of_dragon_fart
      count: 2

    # Scrolls — self/buff
    - type: scroll_of_invisibility
      count: 2
    - type: scroll_of_shield
      count: 1
    - type: scroll_of_haste
      count: 1
    - type: scroll_of_silence
      count: 1
    - type: scroll_of_light
      count: 1
    - type: scroll_of_detect_monsters
      count: 1
    - type: scroll_of_magic_mapping
      count: 1
    - type: scroll_of_enchant_weapon
      count: 1
    - type: scroll_of_enchant_armor
      count: 1
    - type: scroll_of_identify
      count: 1

    # Scrolls — damage / AoE
    - type: scroll_of_lightning
      count: 1
    - type: scroll_of_fireball
      count: 1
    - type: scroll_of_earthquake
      count: 1
    - type: scroll_of_fear
      count: 1

    # Scrolls — movement
    - type: scroll_of_teleport
      count: 1
    - type: scroll_of_blink
      count: 1

    # Scrolls — stubs (raise_dead no-ops until corpse system lands)
    - type: scroll_of_raise_dead
      count: 1

    # Wands — single-target
    - type: wand_of_lightning
      count: 1
    - type: wand_of_confusion
      count: 1
    - type: wand_of_slow
      count: 1
    - type: wand_of_glue
      count: 1
    - type: wand_of_rage
      count: 1
    - type: wand_of_yo_mama
      count: 1
    - type: wand_of_dragon_farts
      count: 1

    # Wands — location/AoE
    - type: wand_of_fireball
      count: 1
    - type: wand_of_teleportation
      count: 1
    # wand_of_portals intentionally omitted — player always starts with one from CreateDefaultPlayer()

  equipment:
    # Weapons — test pick-up, equip, unequip
    - type: dagger
      count: 1
    - type: shield
      count: 1
    - type: spear
      count: 1
    - type: greatsword
      count: 1
    - type: shortsword
      count: 1
    - type: longsword
      count: 1
    - type: mace
      count: 1
    - type: rapier
      count: 1
    - type: battleaxe
      count: 1
    # Armor — test pick-up, equip, unequip
    - type: leather_helmet
      count: 1
    - type: leather_boots
      count: 1
    - type: studded_leather
      count: 1
    - type: chain_mail
      count: 1

scenario_id: giant_spider_identity
name: "Giant Spider Identity Test"
description: "Regression anchor for giant spider: on-hit poison (10 turns), high dexterity (+3 accuracy/evasion), speed_bonus 0.35 (acts more frequently). H_MP > 5 confirms spider is landing hits and poison applies. No PoC reference for this monster — first-run values needed to calibrate bands."
depth: 8
turn_limit: 150
runs: 30
map_width: 14
map_height: 10
player_start_x: 2
player_start_y: 5

player:
  hp: 54
  strength: 12
  dexterity: 14
  constitution: 12
  accuracy: 2
  evasion: 1
  damage_min: 1
  damage_max: 4
  weapon: "longsword"
  armor: "leather_armor"

monsters:
  # Single giant spider — 18 HP, dmg 4-8, speed_bonus 0.35, on-hit poison 10 turns
  # One spider is sufficient to confirm poison fires; 2v1 at depth 8 was too punishing
  - type: "giant_spider"
    count: 1
    position: [10, 5]
    state: "aware"

items:
  # Potions to sustain through poison pressure — spider dmg 4-8 + poison DOT is significant
  - type: "healing_potion"
    count: 5

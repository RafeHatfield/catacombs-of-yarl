# Baseline for depth 5 affix probes. 3 grunts + 1 brute + 1 potion = 42% death with dagger.
# The brute is the tier-defining threat. Dagger (weak DPR) vs brute = spike danger.
# Affix variants (fine/keen/masterwork/vicious) should show progressively lower death rate.
# PoC has no depth5_orc_* scenarios — this is a C# calibration anchor for gear scaling.
monsters:
  - type: "orc_grunt"
    count: 3
  - type: "orc_brute"
    count: 1

items:
  - type: "healing_potion"
    count: 1

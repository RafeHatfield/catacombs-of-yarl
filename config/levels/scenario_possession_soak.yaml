scenario_id: possession_soak
name: "Possession Soak — Drain and Visibility Tuning"
depth: 7
turn_limit: 200
runs: 50

player:
  hp: 54
  strength: 14
  dexterity: 14
  constitution: 14
  accuracy: 2
  evasion: 1
  damage_min: 2
  damage_max: 6
  weapon: "shortsword"
  armor: "chainmail"

# Possessable targets at mid-range. Player possesses the orc_grunt (closest),
# then presses deeper while the home body drains. Validates:
#   - DrainPerTurn removes HP correctly over N turns
#   - Visibility constraint fires at MaxPossessionDistance
#   - Safety rail clamps HP to 1 on drain (not forced kill)
monsters:
  - type: "orc_grunt"
    count: 1
    position: [6, 6]
  - type: "orc_brute"
    count: 1
    position: [10, 6]
  - type: "orc_shaman"
    count: 1
    position: [8, 3]

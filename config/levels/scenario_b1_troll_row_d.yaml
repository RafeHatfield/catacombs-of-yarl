scenario_id: b1_troll_row_d
name: "B1 Troll (Row D) — no counter, spike floor"
description: >
  Troll characterization without its counter. §4 row D: "1 troll, no acid access → lethal
  by attrition." This is the EXPECTED LETHAL floor — NOT a finding if it's very hard. The
  real characterization (does the counter flip it to winnable) is Row E, blocked on the
  §5.2 counter-access fix. What this pass produces: spike-path capture validation (first
  real Spike scenario), fight shape (H_PM/H_MP for a spike vs orc baseline), and the
  baseline reading that Row E will be measured against.
  
  The troll regenerates 2 HP/turn — keep regeneration-suppression items OUT of the kit.
  The troll's counter (acid/fire) is also kept out: no acid_coating items, no fire source.
depth: 4
turn_limit: 150
runs: 100
category: "B1_troll_spike"

# Band reflects the expected spike floor: lethal without counter is the design intent.
target_death_pct: { min: 0.70, max: 1.00 }

player:
  hp: 54
  strength: 14
  dexterity: 14
  constitution: 14
  accuracy: 3
  evasion: 1
  damage_min: 1
  damage_max: 4
  weapon: "dagger"
  armor: "leather_armor"

monsters:
  - type: "troll"
    count: 1
    position: [8, 6]

items:
  - type: "healing_potion_cd"
    count: 1

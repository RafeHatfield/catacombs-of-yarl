# Item loot tags — category assignments, weights, and band availability.
# Each item appears exactly once. Items may have only one category (the primary category
# for loot selection). Multi-category items in the PoC were simplified to their dominant
# category for the C# implementation.
#
# Categories:
#   healing        — HP restoration
#   defensive      — protection/mitigation (not healing; tracked separately by pity)
#   panic          — emergency escape (teleport, haste, blink, invisibility)
#   offensive      — direct damage (fireball, lightning, plague, fear)
#   utility        — tactical/situational (confusion, slow, glue, identify)
#   upgrade_weapon — weapon improvements (weapons + enchant_weapon scroll)
#   upgrade_armor  — armor improvements (armor pieces + enchant_armor scroll)
#   rare           — rings (all ring types, depth-gated via band_min)
#   key            — progression keys (empty for now — no keys exist yet)
#
# Bands: B1=1, B2=2, B3=3, B4=4, B5=5 (each band = 5 dungeon floors)
# band_min/band_max refer to band numbers, not depth numbers.
# B1 = depths 1-5, B2 = depths 6-10, B3 = depths 11-15, B4 = depths 16-20, B5 = depths 21-25.
#
# Weights are relative within a category. Higher weight = more likely to be selected
# when that category is chosen. PoC weights from balance/loot_tags.py.

loot_tags:

  # ─── HEALING ──────────────────────────────────────────────────────────────
  - item_id: healing_potion
    categories: [healing]
    weight: 10.0
    band_min: 1
    band_max: 5


# Game settings loaded at boot by Main._Ready().
# Override any field via CLI: --tileset 16bit_fantasy --map-mode iso
# Missing file → silent fallback to defaults (no error).

# Which tileset to use. Must match a file in config/tilesets/{id}.yaml.
# Supported values: ultimate_fantasy, 16bit_fantasy (once TASK-006 is complete)
tileset: "16bit_fantasy"

# Which map renderer to use.
# Supported values: topdown (default, 16bf world tiles 24x24), iso (legacy isometric)
# Unknown values fall back to "topdown" with a warning at boot.
map_mode: "topdown"

# Difficulty level for the identification system pre-identification probabilities.
# easy: most items start identified (80-90%); medium: balanced (30-50%); hard: almost nothing (0-5%).
# Unknown values default to "medium".
difficulty: "medium"

# Debug overlay visibility (debug builds only). Default hidden.
show_debug_overlay: false

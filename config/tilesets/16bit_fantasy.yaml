id: 16bit_fantasy
name: "Oryx 16-Bit Fantasy"
sprite_size: 48          # renders at native 24px (scale = 48/48 = 1.0x) — adjust to 32 for 1.5x, 24 for 2x
entity_y_offset: 2.0    # push down to ground feet on iso tile (default formula floats 16bf sprites)
frame_count: 2
frame_stride: 1
frame_offset: -1
frame_pattern: "oryx_16bit_fantasy_creatures_{index:D2}.png"
sprites_root: "res://src/Presentation/assets/sprites_16bf/creatures_24x24"
items_root: "res://src/Presentation/assets/sprites_16bf/items_16x16"
player_sprite: "1"  # Knight M (frame A file 01)

  # NOTE: YAML values are the actual sprite FILE NUMBERS (frame A = standing pose).
  # The 16bf sheet uses a batch-of-18 layout: within each row of 18 creatures,
  # all 18 frame A sprites come first, then all 18 frame B sprites 18 files later.
  # Formula: frameA(packed) = packed + 18 × floor((packed−1) / 18)
  #          frameB = frameA + 18
  #
  # With frame_stride=1, frame_offset=-1: spriteIndex = key × 1 + animFrame + (−1) = key
  # So the YAML key IS the file number to load. Use frame A file numbers here.
  # To find any sprite: open tools/sprite_browser_16bf.html, click the cell → copies the key.

entities:
  # Orcs
  orc: "253"        # Goblin Fighter    packed=127 → frameA=253
  orc_grunt: "253"  # Goblin Fighter    packed=127 → frameA=253
  orc_brute: "259"  # Orc Captain       packed=133 → frameA=259

  # Goblinoids / humanoids
  troll: "261"      # Troll             packed=135 → frameA=261
  cultist: "299"    # Dark Wizard       packed=155 → frameA=299

  # Thief — best match is Assassin (packed=55)
  thief: "109"      # Assassin          packed=55  → frameA=109

  # Creatures
  rat: "224"        # Grey Rat          packed=116 → frameA=224
  giant_rat: "224"  # Grey Rat          packed=116 → frameA=224
  bat: "219"        # Black Bat         packed=111 → frameA=219
  spider: "222"     # Red Spider        packed=114 → frameA=222

  # Slimes
  slime: "218"      # Green Slime       packed=110 → frameA=218
  large_slime: "217" # Purple Slime     packed=109 → frameA=217

  # Undead
  zombie: "289"     # Zombie            packed=145 → frameA=289
  skeleton: "291"   # Skeleton          packed=147 → frameA=291
  mummy: "296"      # Mummy             packed=152 → frameA=296
  lich: "298"       # Necromancer       packed=154 → frameA=298

  # Bosses / deep
  minotaur: "185"   # Minotaur Axe      packed=95  → frameA=185
  demon: "188"      # Elder Demon       packed=98  → frameA=188
  golem: "191"      # Stone Golem       packed=101 → frameA=191

  # Ogre — no direct Ogre sprite; Ettin (packed=177)
  ogre: "339"       # Ettin             packed=177 → frameA=339


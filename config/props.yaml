# Room Props Definition
#
# Each prop has:
#   tile_ids:        Array of tile IDs from the Oryx 16bf world_24x24 sheet.
#                    Leave [] if no tile has been chosen yet.
#                    If multiple IDs are listed, one is chosen randomly at placement time.
#   footprint:       [width, height] in tiles. Use [1,1] for most props.
#   blocks_movement: true = furniture/obstacle. false = floor overlay (puddles, grates, moss).
#   placement:       wall_adjacent | center | corner | free_standing | floor_overlay
#   tags:            Grouping hints used by archetype recipes.
#   display_name:    Short human-readable name shown in the inspect panel.
#   description:     One-sentence atmospheric description shown on long-press inspect.
#
# Browse tools/sprite_browser_16bf_world.html to find tile IDs.
# List multiple IDs for variants: tile_ids: [123, 124, 125]

props:

  # ---------------------------------------------------------------------------
  # Dungeon Basics
  # ---------------------------------------------------------------------------

  barrel:
    display_name: "Barrel"
    description: "A battered wooden barrel, stained with something best left unidentified."
    tile_ids: [268]
    footprint: [1, 1]
    blocks_movement: true
    placement: corner
    tags: [storage, dungeon_basic]

  barrel_open:
    display_name: "Open Barrel"
    description: "The barrel has already been rifled through — nothing left but splinters."
    tile_ids: [269]
    footprint: [1, 1]
    blocks_movement: true
    placement: corner
    tags: [storage, dungeon_basic]

  crate:
    display_name: "Crate"
    description: "A heavy wooden crate, nailed shut with iron spikes."
    tile_ids: [327]
    footprint: [1, 1]

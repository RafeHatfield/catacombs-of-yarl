    blocks_movement: false
    placement: floor_overlay
    tags: [scatter, living]
    # Multi-tile: tile IDs in row-major order (left→right, top→bottom).
    # Two colour variants; one is chosen randomly at placement time.
    # Renderer reads footprint [3,3] and maps index → offset (i%w, i/w).
    tile_layouts:
      - [1374, 1375, 1376, 1431, 1432, 1433, 1488, 1489, 1490]  # tan/brown
      - [1377, 1378, 1379, 1434, 1435, 1436, 1491, 1492, 1493]  # blue


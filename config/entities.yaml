# Floor item pool — items eligible to spawn as floor loot.
# weight: relative spawn frequency (higher = more common).
# min_depth: first floor depth where the item can appear.
# TODO: add max_depth and band-based density scaling to match PoC B1-B5 methodology.
# TODO: integrate consumables into this pool (unified spawn logic with depth-scaled density).
floor_item_pool:
  # Weapons — depth 1
  - item: dagger
    weight: 25
    min_depth: 1
  - item: club
    weight: 25
    min_depth: 1
  - item: mace
    weight: 30
    min_depth: 1
  - item: shortsword
    weight: 20
    min_depth: 1
  # Weapons — depth 2
  - item: rapier
    weight: 20
    min_depth: 2
  - item: spear
    weight: 20
    min_depth: 2
  - item: longsword
    weight: 15
    min_depth: 2
  # Weapons — depth 3
  - item: battleaxe
    weight: 15
    min_depth: 3
  - item: greatsword
    weight: 10
    min_depth: 3
  # Armor — depth 1
  - item: leather_armor
    weight: 30
    min_depth: 1
  - item: shield
    weight: 25
    min_depth: 1
  - item: leather_helmet
    weight: 20
    min_depth: 1
  - item: leather_boots
    weight: 20
    min_depth: 1
  # Armor — depth 2+
  - item: studded_leather
    weight: 20
    min_depth: 2
  # Armor — depth 3+
  - item: chain_mail
    weight: 15
    min_depth: 3
  - item: scale_mail
    weight: 10
    min_depth: 3
  # Scrolls — common (depth 1+)
  # Weights doubled from 15→30 to ensure ~1-2 scrolls per floor at depth 1.
  # At 15 each, total depth-1 scroll weight was ~60 vs ~195 gear = 23.5% → ~0.5 scrolls/floor.
  # At 30 each, it's ~105 vs ~195 gear = 35% → ~0.8-1.0 scrolls/floor. Add earthquake below to reach ~1-2.
  - item: scroll_of_light
    weight: 30
    min_depth: 1
  - item: scroll_of_detect_monsters
    weight: 30
    min_depth: 1
  - item: scroll_of_lightning
    weight: 30
    min_depth: 1
  # Scrolls — uncommon (depth 2+) — earthquake moved to depth 1: low-danger, good for early floors
  - item: scroll_of_earthquake
    weight: 20
    min_depth: 1
  - item: scroll_of_magic_mapping
    weight: 10
    min_depth: 2
  - item: scroll_of_enchant_weapon
    weight: 10
    min_depth: 2
  # Scrolls — rare (depth 3+)
  - item: scroll_of_enchant_armor
    weight: 6
    min_depth: 3
  # Scrolls — Phase 3 single-target (depth 2+, common)
  - item: scroll_of_confusion
    weight: 12
    min_depth: 2
  - item: scroll_of_slow
    weight: 12
    min_depth: 2
  - item: scroll_of_glue
    weight: 10
    min_depth: 2
  - item: scroll_of_rage
    weight: 8
    min_depth: 3
  - item: scroll_of_yo_mama
    weight: 6
    min_depth: 3
  - item: scroll_of_disarm
    weight: 8
    min_depth: 2
  - item: scroll_of_plague
    weight: 6
    min_depth: 4
  - item: scroll_of_aggravation
    weight: 5
    min_depth: 3
  # Phase 3 — common (depth 1+)
  - item: scroll_of_fear
    weight: 30
    min_depth: 1
  # Phase 3 — uncommon (depth 2+)
  - item: scroll_of_teleport
    weight: 10
    min_depth: 2
  - item: scroll_of_blink
    weight: 10
    min_depth: 2
  - item: scroll_of_invisibility
    weight: 10
    min_depth: 2
  - item: scroll_of_shield
    weight: 10
    min_depth: 2
  - item: scroll_of_haste
    weight: 10
    min_depth: 2
  - item: scroll_of_silence
    weight: 10
    min_depth: 2
  # Phase 3 — rare (depth 3+)
  - item: scroll_of_fireball
    weight: 6
    min_depth: 3
  - item: scroll_of_dragon_fart
    weight: 6
    min_depth: 3
  # Phase 4 — deep dungeon (depth 5+, stub until corpse system lands)
  # weight: 0 — corpse system not yet implemented; handler is a no-op (see plan_monster_specials)
  - item: scroll_of_raise_dead
    weight: 0
    min_depth: 5
  # Wands (depth 2+, intentionally rarer than scrolls)
  - item: wand_of_lightning
    weight: 8
    min_depth: 2
  - item: wand_of_confusion
    weight: 5
    min_depth: 3
  - item: wand_of_slow
    weight: 5
    min_depth: 3
  - item: wand_of_glue
    weight: 6
    min_depth: 3
  - item: wand_of_rage
    weight: 4
    min_depth: 4
  - item: wand_of_yo_mama
    weight: 3
    min_depth: 4
  # Phase 4 — rare deep wands
  - item: wand_of_fireball
    weight: 7
    min_depth: 5
  - item: wand_of_teleportation
    weight: 6
    min_depth: 6
  - item: wand_of_dragon_farts
    weight: 3
    min_depth: 4


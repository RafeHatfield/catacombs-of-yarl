    color: [100, 200, 100]

  scroll_of_aggravation:
    name: "Scroll of Unreasonable Aggravation"
    description: "The target turns on their own kind in a fit of murderous aggravation."
    spell_id: "aggravation"
    targeting: "single_target"
    range: 10
    char: "~"
    color: [255, 100, 150]

  # ── Phase 3: AoE / Self / Location scrolls ──────────────────────────────

  scroll_of_fear:
    name: "Scroll of Fear"
    description: "A wave of primal terror radiates outward. All nearby enemies flee in panic."
    spell_id: "fear"
    targeting: "aoe_self"
    radius: 10
    duration: 15
    char: "~"
    color: [180, 180, 255]

  scroll_of_teleport:

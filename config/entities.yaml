consumables:
  healing_potion:
    name: "Healing Potion"
    heal_amount: 40
    char: "!"
    color: [127, 0, 255]

  # ── Buff Potions (drink-only, no throw) ─────────────────────────────────────
  # These are safe to drink unidentified. No ThrowSpellId → immediate drink on tap.
  # PoC reference: item_functions.py drink_speed_potion / drink_protection_potion / etc.

  potion_of_speed:
    name: "Potion of Speed"
    is_potion: true
    spell_id: "haste"
    targeting: "self"
    duration: 20
    char: "!"
    color: [255, 220, 50]

  potion_of_protection:
    name: "Potion of Protection"
    is_potion: true
    spell_id: "drink_protection"
    targeting: "self"
    duration: 50
    char: "!"
    color: [100, 180, 255]

  potion_of_regeneration:
    name: "Potion of Regeneration"
    is_potion: true
    spell_id: "drink_regeneration"
    targeting: "self"
    duration: 50
    char: "!"
    color: [50, 220, 100]

  potion_of_invisibility:
    name: "Potion of Invisibility"
    is_potion: true
    spell_id: "invisibility"
    targeting: "self"
    duration: 30
    char: "!"
    color: [200, 200, 240]

  potion_of_heroism:
    name: "Potion of Heroism"
    is_potion: true
    spell_id: "drink_heroism"
    targeting: "self"
    duration: 30
    char: "!"
    color: [255, 160, 0]

  # ── Debuff Potions (dual-mode: drink self = bad, throw at enemy = good) ─────
  # These are dangerous if drunk unidentified. ThrowSpellId triggers throw-first targeting.
  # PoC reference: item_functions.py drink_weakness_potion / drink_slowness_potion / etc.

  potion_of_weakness:
    name: "Potion of Weakness"
    is_potion: true
    spell_id: "drink_weakness"
    targeting: "self"
    duration: 30
    throw_spell_id: "throw_weakness"
    range: 10
    char: "!"
    color: [180, 100, 180]

  potion_of_slowness:
    name: "Potion of Slowness"
    is_potion: true
    spell_id: "drink_slowness"
    targeting: "self"
    duration: 20
    throw_spell_id: "throw_slowness"
    range: 10
    char: "!"
    color: [150, 100, 200]

  potion_of_blindness:
    name: "Potion of Blindness"
    is_potion: true
    spell_id: "drink_blindness"
    targeting: "self"
    duration: 15
    throw_spell_id: "throw_blindness"
    range: 10
    char: "!"
    color: [80, 80, 80]

  potion_of_paralysis:
    name: "Potion of Paralysis"
    is_potion: true
    spell_id: "drink_paralysis"
    targeting: "self"
    # duration: 3-5 random — resolved in SpellResolver.ResolveParalysisPotion
    throw_spell_id: "throw_paralysis"
    range: 10
    char: "!"
    color: [200, 150, 50]

  tar_potion:
    name: "Tar Potion"
    is_potion: true
    spell_id: "drink_tar"
    targeting: "self"
    duration: 10
    throw_spell_id: "throw_tar"
    range: 10
    char: "!"
    color: [60, 50, 40]

  # ── Dual-mode and Special Potions ────────────────────────────────────────────
  # root_potion: drink = BarkskinEffect (+3 AC/10t), throw = EntangledEffect (3t).
  # sunburst_potion: drink = FocusedEffect (+2 acc/8t), throw = BlindedEffect (3t).
  # fire_potion: throw-only (single_target). Drink does nothing useful.
  # antidote_potion: drink-only, cures plague.

  root_potion:
    name: "Root Potion"
    is_potion: true
    spell_id: "drink_root"
    targeting: "self"
    duration: 10
    throw_spell_id: "throw_root"
    range: 10
    char: "!"
    color: [80, 160, 80]

  sunburst_potion:
    name: "Sunburst Potion"
    is_potion: true
    spell_id: "drink_sunburst"
    targeting: "self"
    duration: 8
    throw_spell_id: "throw_sunburst"
    range: 10
    char: "!"
    color: [255, 255, 100]

  fire_potion:
    name: "Fire Potion"
    is_potion: true
    spell_id: "throw_fire"
    targeting: "single_target"
    duration: 4
    range: 10
    char: "!"
    color: [255, 80, 0]

  antidote_potion:
    name: "Antidote Potion"
    is_potion: true
    spell_id: "drink_antidote"
    targeting: "self"
    char: "!"
    color: [0, 200, 80]


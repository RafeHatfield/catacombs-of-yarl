    description: "Blind fury seizes the target. They attack with doubled strength — but anyone nearby."
    spell_id: "rage"
    targeting: "single_target"
    range: 8
    duration: 8
    char: "~"
    color: [255, 80, 80]

  scroll_of_yo_mama:
    name: "Scroll of Yo Mama"
    description: "Your devastating insult drives the target into a permanent killing frenzy — against you."
    spell_id: "yo_mama"
    targeting: "single_target"
    range: 10
    char: "~"
    color: [255, 200, 50]

  scroll_of_disarm:
    name: "Scroll of Disarm"
    description: "The target's weapon flies from their grip. They fight with bare hands."
    spell_id: "disarm"
    targeting: "single_target"
    range: 8
    duration: 3
    char: "~"
    color: [200, 200, 150]

  scroll_of_plague:
    name: "Scroll of Plague"
    description: "Vile plague infects the target. Each turn it eats away at their flesh."
    spell_id: "plague"
    targeting: "single_target"
    range: 8
    duration: 20

# Floor item pool — items eligible to spawn as floor loot.
# weight: relative spawn frequency (higher = more common).
# min_depth: first floor depth where the item can appear.
# TODO: add max_depth and band-based density scaling to match PoC B1-B5 methodology.
# TODO: integrate consumables into this pool (unified spawn logic with depth-scaled density).
floor_item_pool:
  # Weapons — depth 1
  - item: dagger
    weight: 25
    min_depth: 1
  - item: club
    weight: 25
    min_depth: 1
  - item: mace
    weight: 30
    min_depth: 1
  - item: shortsword
    weight: 20
    min_depth: 1
  # Weapons — depth 2
  - item: rapier
    weight: 20
    min_depth: 2
  - item: spear
    weight: 20
    min_depth: 2
  - item: longsword
    weight: 15
    min_depth: 2
  # Weapons — depth 3
  - item: battleaxe
    weight: 15
    min_depth: 3
  - item: greatsword
    weight: 10
    min_depth: 3
  # Armor — depth 1
  - item: leather_armor
    weight: 30
    min_depth: 1
  - item: shield
    weight: 25
    min_depth: 1
  - item: leather_helmet
    weight: 20
    min_depth: 1
  - item: leather_boots
    weight: 20
    min_depth: 1
  # Armor — depth 2+

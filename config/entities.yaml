  # ── Phase 3: Single-target status effect scrolls ────────────────────────

  scroll_of_confusion:
    name: "Scroll of Confusion"
    description: "The target's mind dissolves into chaos. They stumble and attack at random."
    spell_id: "confusion"
    targeting: "single_target"
    range: 8
    duration: 10
    char: "~"
    color: [200, 150, 255]

  scroll_of_slow:
    name: "Scroll of Slow"
    description: "The target's movements become sluggish, acting only every other turn."
    spell_id: "slow"
    targeting: "single_target"
    range: 8
    duration: 10
    char: "~"
    color: [150, 200, 255]

  scroll_of_glue:
